[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "dist"

[build.environment]
  NODE_VERSION = "20"

# Route all requests through the Hono function
# Static files in dist/ are served directly by Netlify CDN
# Everything else falls through to the function
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/index"
  status = 200

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
